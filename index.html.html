<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UHQ SEARCHER / LOOKUP</title>
<style>
body{font-family:Arial;margin:0;background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;color:#ff4d4d;text-align:center}
header{padding:20px;border-bottom:2px solid red;box-shadow:0 0 25px red;background:rgba(0,0,0,0.7)}
.choice{display:flex;justify-content:center;gap:30px;margin-top:60px;flex-wrap:wrap}
.box{border:2px solid red;padding:25px;cursor:pointer;box-shadow:0 0 20px red;background:rgba(0,0,0,0.6);border-radius:25px}
.post{background:linear-gradient(135deg, rgba(255,0,0,0.15), rgba(0,0,0,0.7));border:1px solid red;border-radius:20px;margin:10px auto;padding:20px;width:80%;text-align:left}
.pseudo{font-size:20px;font-weight:bold;color:#ff0000}
.hidden{display:none}
button{margin:5px;padding:8px;background:red;color:white;border:none;cursor:pointer}

/* ANCIEN PANEL STYLE */
#adminPanel{position:fixed;right:0;top:0;width:320px;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border-left:2px solid red;box-shadow:-5px 0 30px red;display:none;padding:15px;text-align:left;overflow:hidden}
.tab{padding:10px;border:1px solid red;margin-bottom:10px;border-radius:15px;cursor:pointer;background:rgba(255,255,255,0.05);position:relative;overflow:hidden}
.tab::after{content:"";position:absolute;top:-100%;left:0;width:100%;height:200%;background:linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);animation:rain 1.5s linear infinite}
@keyframes rain{0%{top:-100%}100%{top:100%}}
.tab:hover{background:red;color:white}

#superAdmin{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;overflow:auto}
.playerBubble{background:yellow;color:black;margin:10px auto;padding:15px;border-radius:20px;width:200px;cursor:pointer}

#homeBubble{position:fixed;bottom:20px;right:20px;background:red;padding:12px;border-radius:20px;cursor:pointer}

#loginPanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:black;padding:20px;border:2px solid red;display:none}

#globalMessage{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:15px;border-radius:20px;display:none;color:white}

.chatBox{background:rgba(0,0,0,0.6);padding:10px;margin-top:10px}
</style>
</head>
<body onkeydown="detectKey(event)">

<header>
<h1 onclick="openCode()">🚀 UHQ SEARCHER</h1>
<p id="player"></p>
</header>

<div id="home" class="choice">
<div class="box" onclick="openSearch()">🔍 SEARCH</div>
<div class="box" onclick="openFicheMenu()">📁 FICHE</div>
</div>

<div id="homeBubble" onclick="openLogin()">-Login-</div>

<div id="loginPanel">
<input id="user" placeholder="user"><br>
<input id="pass" placeholder="pass" type="password"><br>
<button onclick="login()">login</button>
<button onclick="register()">create</button>
<button onclick="closeLogin()">close</button>
</div>

<div id="search" class="hidden">
<button onclick="goHome()">⬅️</button>
<div class="choice">
<div class="box" onclick="window.open('https://youtube.com/shorts/z2AzGT0TgTU?si=3336n9ByfH_1U2dC')">📺 TUTO</div>
<div class="box" onclick="window.open('https://discord.gg/wVnc5D6R8p')">💻 LOOKUP</div>
</div>
</div>

<div id="ficheMenu" class="hidden">
<button onclick="goHome()">⬅️</button>
<div class="choice">
<div class="box" onclick="openFiche('map')">🗺️ MAP</div>
<div class="box" onclick="openFiche('random')">🎲 RANDOM</div>
<div class="box" onclick="openFiche('discord')">💬 DISCORD</div>
</div>
</div>

<div id="fiche" class="hidden">
<button onclick="backMenu()">⬅️</button>
<div id="posts"></div>
<div id="creatorZone" class="hidden">
<input id="text" placeholder="écrire fiche">
<button onclick="post()">POST</button>
</div>
</div>

<!-- PANEL CREA (ANCIEN + NOUVEAUX) -->
<div id="adminPanel">
<h2>⚙️ UHQ PANEL</h2>

<div class="tab" onclick="showPanel('stats')">📊 Stats</div>
<div class="tab" onclick="showPanel('manage')">🛠️ Gestion</div>
<div class="tab" onclick="showPanel('logs')">📜 Logs</div>
<div class="tab" onclick="openSuper()">🟡 ADMIN PANEL</div>
<div class="tab" onclick="saveCreator()">💾 SE SAVE</div>
<div class="tab" onclick="closeAdmin()">❌ Fermer</div>

<div id="panelStats" class="panelContent">
<p id="playerInfo"></p>
</div>

<div id="panelManage" class="panelContent hidden">
<input id="adminCommand" placeholder="+adminID">
<button onclick="handleAdminCommand()">OK</button>
</div>

<div id="panelLogs" class="panelContent hidden">
<div id="logs"></div>
</div>
</div>

<div id="superAdmin">
<h1>⚡ PANEL ADMIN ⚡</h1>
<div id="players"></div>

<div class="chatBox">
<h4>💬 CHAT ADMIN</h4>
<input id="chatAdminInput"><button onclick="sendAdmin()">send</button>
<div id="chatAdminBox"></div>
</div>
<button onclick="closeSuper()">close</button>
</div>

<div id="globalMessage"></div>

<script>
let creator=false;
let currentUser=null;
let currentCat='map';
let admins=JSON.parse(localStorage.getItem('admins')||"[]");
let roles=JSON.parse(localStorage.getItem('roles')||"{}");
let creatorSaved=localStorage.getItem('creatorSaved')||"false";
let posts=JSON.parse(localStorage.getItem('posts')||"[]");
let players=JSON.parse(localStorage.getItem('players')||"[]");
let chatCrea=JSON.parse(localStorage.getItem('chatCrea')||"[]");
let chatAdmin=JSON.parse(localStorage.getItem('chatAdmin')||"[]");

let id=localStorage.getItem('id')||("ID-"+Math.floor(Math.random()*9999));
localStorage.setItem('id',id);
document.getElementById('player').innerText="ID : "+id;

if(!players.includes(id)){players.push(id);localStorage.setItem('players',JSON.stringify(players));}

// LOGIN
function openLogin(){loginPanel.style.display='block'}
function closeLogin(){loginPanel.style.display='none'}
function register(){localStorage.setItem(user.value,pass.value);alert('created')}
function login(){
if(localStorage.getItem(user.value)===pass.value){
currentUser=user.value;
creatorZone.style.display='block';
alert('connecté '+user.value+' '+id);
}
}

// NAV
function openSearch(){home.style.display='none';search.style.display='block'}
function openFicheMenu(){home.style.display='none';ficheMenu.style.display='block'}
function openFiche(cat){currentCat=cat;ficheMenu.style.display='none';fiche.style.display='block';renderPosts()}
function goHome(){search.style.display='none';ficheMenu.style.display='none';fiche.style.display='none';home.style.display='flex'}
function backMenu(){fiche.style.display='none';ficheMenu.style.display='block'}

// POSTS
function post(){if(!currentUser)return;posts.push({user:currentUser,text:text.value,cat:currentCat});localStorage.setItem('posts',JSON.stringify(posts));renderPosts()}
function renderPosts(){let postsDiv=document.getElementById('posts');postsDiv.innerHTML="";posts.filter(p=>p.cat===currentCat).forEach(p=>{let d=document.createElement('div');d.className='post';d.innerHTML=`<div class='pseudo'>${p.user}</div>${p.text}`;postsDiv.appendChild(d)})}

// PANEL
function openAdmin(){adminPanel.style.display='block'}
function openSuper(){if(creator||admins.includes(id)){superAdmin.style.display='block';loadPlayers()}}
function closeSuper(){superAdmin.style.display='none'}

// CODE CREA (NE L'OUVRE PLUS AUTO)
function openCode(){
if(creatorSaved==='true'){creator=true;}
if(prompt('code')==='2469'){
creator=true;
alert('mode créateur actif');
}
}

// LNS + P
let secret="";
function detectKey(e){
secret+=e.key.toUpperCase();

if(secret.includes("LNS") && creator){
openAdmin();
secret="";
}

if(e.key==='p'){
openAdmin();
if(admins.includes(id))openSuper();
}
}

// ADMIN ADD
function handleAdminCmd(){
let cmd=prompt('+adminID');
if(cmd && cmd.startsWith('+admin')){
let newId=cmd.replace('+admin','');
admins.push(newId);
localStorage.setItem('admins',JSON.stringify(admins));
alert('admin ajouté');
if(newId===id){openSuper();}
}
}

// SAVE ROLE
function saveRole(){roles[id]='creator';localStorage.setItem('roles',JSON.stringify(roles));alert('saved')}

// PLAYERS
function loadPlayers(){let playersDiv=document.getElementById('players');playersDiv.innerHTML="";players.forEach(p=>{let d=document.createElement('div');d.className='playerBubble';d.innerText=p;playersDiv.appendChild(d)})}

// CHATS
function sendCrea(){chatCrea.push(chatCreaInput.value);localStorage.setItem('chatCrea',JSON.stringify(chatCrea));renderCrea()}
function renderCrea(){chatCreaBox.innerHTML=chatCrea.join('<br>')}

function sendAdmin(){chatAdmin.push(chatAdminInput.value);localStorage.setItem('chatAdmin',JSON.stringify(chatAdmin));renderAdmin()}
function renderAdmin(){chatAdminBox.innerHTML=chatAdmin.join('<br>')}

function saveCreator(){localStorage.setItem('creatorSaved','true');alert('SAVE CREA OK')}

renderPosts();renderCrea();renderAdmin();
</script>

</body>
</html>
